name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret not set!"
            exit 1
          fi
          git remote add hf "https://Rudra070311:${HF_TOKEN}@huggingface.co/spaces/Rudra070311/Finlife-Openenv"
          git push hf main --force || exit 1
          echo "✅ Successfully pushed to HF Space!"
